name: NTIS 공고 수집

on:
  schedule:
    # 한국시간 기준 하루 6회
    # KST 00:00 = UTC 15:00 (전날)
    - cron: '0 15 * * *'
    # KST 09:00 = UTC 00:00
    - cron: '0 0 * * *'
    # KST 10:00 = UTC 01:00
    - cron: '0 1 * * *'
    # KST 15:00 = UTC 06:00
    - cron: '0 6 * * *'
    # KST 18:00 = UTC 09:00
    - cron: '0 9 * * *'
    # KST 21:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: NTIS 공고 수집
        run: python scraper/ntis_scraper.py

      - name: last_checked 시간 기록 (항상 실행)
        shell: python
        run: |
          import json, datetime, os
          path = 'data/announcements.json'
          if not os.path.exists(path):
              data = {'items': [], 'last_checked': '-'}
          else:
              with open(path, 'r', encoding='utf-8') as f:
                  try:
                      data = json.load(f)
                  except:
                      data = {'items': []}
          if isinstance(data, list):
              data = {'items': data}
          kst = datetime.timezone(datetime.timedelta(hours=9))
          data['last_checked'] = datetime.datetime.now(kst).strftime('%Y-%m-%d %H:%M')
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

      - name: 데이터 파일 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/announcements.json
          # 변경사항이 있는지 확인 후 커밋 (없어도 last_checked 때문에 항상 존재함)
          git commit -m "chore: NTIS 공고 데이터 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')" || exit 0
          
          # 원격 저장소의 최신 내용을 가져와서 현재 커밋 위에 재배치 (충돌 방지)
          git pull --rebase origin main
          git push origin main
