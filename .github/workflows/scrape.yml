name: NTIS 공고 수집

on:
  schedule:
    # 한국시간 기준 하루 4회 (UTC 00:00, 06:00, 12:00, 18:00 = KST 09:00, 15:00, 21:00, 03:00)
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: NTIS 공고 수집
        run: python scraper/ntis_scraper.py

      - name: 데이터 파일 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/announcements.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: NTIS 공고 데이터 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main
            git push origin main
          fi
